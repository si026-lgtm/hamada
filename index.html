<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>【公式】TikTok Lite 招待ページ</title>

  <style>
    /* 画面いっぱいに広げる設定 */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* スクロールバーを隠す */
      background-color: #f8f8f8;
    }

    /* iFrame（窓）の設定 */
    .iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe 
      src="https://lite.tiktok.com/t/ZS98Q8yJnA2c6-rYfkI/" 
      title="TikTok Lite Invite"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
