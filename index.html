<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>【公式招待】TikTok Lite 特典を受け取る</title>

  <style>
    body { margin: 0; background-color: #f1f1f1; font-family: sans-serif; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
    
    /* 公式画面のスクリーンショット画像 */
    .official-img { width: 100%; display: block; }

    /* 重ねるボタンのデザイン */
    .overlay-btn {
      position: absolute;
      top: 55%; /* 画像の「ダウンロードする」ボタンの位置に合わせて調整 */
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 50px;
      background: #fe2c55;
      color: white;
      border-radius: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="ここにアップロードした画像のURL" class="official-img">

    <a href="https://lite.tiktok.com/t/ZS98Q8yJnA2c6-rYfkI/" class="overlay-btn">
      TikTok Liteをダウンロードする
    </a>
  </div>

</body>
</html>
