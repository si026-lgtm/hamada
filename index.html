<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  
  <title>【公式】TikTok Lite 特典5,000円分を受け取る</title>
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://assets.st-note.com/img/1774893241-fkn2WsV5bDrqOaUw9pJcgG4h.png" />

  <style>
    body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; font-family: sans-serif; }
    .loading-box { text-align: center; }
    .spinner { border: 4px solid #333; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    // --- 【重要】あなたの招待URL ---
    const inviteUrl = "https://lite.tiktok.com/t/ZS98WjYvQFRqK-wG4Cn/";

    window.onload = function() {
      // 0.1秒（ほぼ一瞬）で公式の「参加ボタン」を自動クリックさせるような動作でストアへ飛ばす
      setTimeout(() => {
        window.location.replace(inviteUrl);
      }, 100);
    };
  </script>
</head>
<body>
  <div class="loading-box">
    <div class="spinner"></div>
    <p>ストアへ移動しています...</p>
    <p style="font-size: 12px; color: #888;">画面が切り替わらない場合は<a href="#" onclick="location.href=inviteUrl" style="color:#fe2c55;">こちら</a></p>
  </div>
</body>
</html>
